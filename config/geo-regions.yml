# Geo region definitions — single source of truth for all geo routing.
# Add a new region here and it flows to obsidian-sync, evaluation modes, and PDF generation.
#
# Used by:
#   - obsidian-sync.mjs (folder + geo tag resolution)
#   - modes/oferta.md Step 0.5 (JD geo auto-detection)
#   - modes/auto-pipeline.md Step 6 (Obsidian folder routing)
#   - modes/pdf.md Step 5 (paper format selection)
#   - cv/build-cv.mjs (geo overlay selection)

default_fallback: US

regions:
  US:
    label: "United States"
    obsidian_folder: "US Applications"
    paper_format: letter
    currency: USD
    currency_symbol: "$"
    spelling: en-US
    detection_signals:
      locations:
        - "United States"
        - "USA"
        - "US-based"
        - "US only"
        - "US-remote"
      cities:
        - "New York"
        - "San Francisco"
        - "Los Angeles"
        - "Chicago"
        - "Austin"
        - "Seattle"
        - "Boston"
        - "Nashville"
        - "Denver"
        - "Miami"
        - "Atlanta"
        - "Dallas"
        - "Houston"
        - "San Diego"
        - "Portland"
        - "Washington DC"
        - "Raleigh"
        - "Pittsburgh"
        - "Minneapolis"
        - "Salt Lake City"
        - "Phoenix"
      states:
        - "CA"
        - "NY"
        - "TX"
        - "WA"
        - "MA"
        - "CO"
        - "FL"
        - "GA"
        - "IL"
        - "TN"
        - "NC"
        - "PA"
        - "OR"
        - "UT"
        - "AZ"
        - "MN"
        - "VA"
      currency_patterns:
        - "$"
        - "USD"
        - "k base"
        - "k OTE"
      visa_keywords:
        - "US work authorization"
        - "US citizen"
        - "green card"
        - "H-1B"
        - "ITAR"
        - "authorized to work in the United States"
      regulatory:
        - "EEOC"
        - "ADA"
        - "FLSA"
        - "at-will"
        - "E-Verify"

  UK:
    label: "United Kingdom"
    obsidian_folder: "UK Applications"
    paper_format: a4
    currency: GBP
    currency_symbol: "£"
    spelling: en-GB
    detection_signals:
      locations:
        - "United Kingdom"
        - "UK-based"
        - "UK only"
        - "Britain"
        - "England"
        - "Scotland"
        - "Wales"
        - "Northern Ireland"
      cities:
        - "London"
        - "Manchester"
        - "Birmingham"
        - "Edinburgh"
        - "Bristol"
        - "Cambridge"
        - "Oxford"
        - "Leeds"
        - "Glasgow"
